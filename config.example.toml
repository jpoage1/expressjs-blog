# config.example.toml
# Copy this to config.toml and fill in your values.
# Environment variables override everything in this file.
# Keys map 1:1 to the convict schema in src/config/schema.cjs

# ── Meta ────────────────────────────────────────────────────────────────────
[meta]
node_env     = "development"        # development | production | testing
site_owner   = "Jason Poage"
country      = "US"
root_dir     = "/srv/projects/expressjs-blog"
content_path = "/srv/projects/expressjs-blog/content"

# ── Internal listen address ──────────────────────────────────────────────────
[network]
schema    = "http"
domain    = "localhost"
address   = "0.0.0.0"
port      = 3000
base_path = ""

# ── Public-facing URLs ───────────────────────────────────────────────────────
[public]
schema    = "https"
domain    = "jasonpoage.com"
address   = "0.0.0.0"
port      = 443
base_path = ""

# ── PostgreSQL ───────────────────────────────────────────────────────────────
[db]
# url      = "postgresql://user:pass@host/db"   # takes priority over fields below
host     = "localhost"
port     = 5432
database = "expressjs-blog"
user     = "expressjs-blog"
# password = ""     # prefer DB_PASS env var
pool_max = 6

# ── Logging ──────────────────────────────────────────────────────────────────
[logging]
log_dir   = "/var/log/expressjs-blog"
log_level = "info"              # error|warn|event|security|notice|info|debug|analytics
db_path   = "/var/lib/expressjs-blog/data"

# ── Authentication (OIDC via express-openid-connect) ─────────────────────────
[auth]
enabled     = false
# verify    = "https://auth.jasonpoage.com/api/verify"
# login     = "https://auth.jasonpoage.com"
cache_ttl   = 120000
timeout_ms  = 5000

# ── Session cookie ────────────────────────────────────────────────────────────
[session.cookie]
secure    = true
same_site = "Lax"
domain    = "jasonpoage.com"    # enables sharing across subdomains

# ── Mail ─────────────────────────────────────────────────────────────────────
[mail]
secure          = false
host            = "localhost"
port            = 1025
domain          = "jasonpoage.com"
newsletter      = "newsletter@jasonpoage.com"
default_subject = "New Contact Form Submission"
log_path        = "/var/lib/expressjs-blog/data/emails.json"
# pass          = ""    # prefer MAIL_PASS env var

# ── OIDC (express-openid-connect / Authelia) ─────────────────────────────────
# Only required when [auth] enabled = true
[auth.oidc]
# secret          = ""    # prefer OIDC_SECRET env var — must be changed in production
client_id         = "expressjs-blog"
# client_secret   = ""    # prefer OIDC_CLIENT_SECRET env var
issuer_base_url   = "https://auth.jasonpoage.com"
scope             = "openid profile email groups"
callback_path     = "/auth/callback"

# ── hCaptcha ─────────────────────────────────────────────────────────────────
[hcaptcha]
# secret = ""   # prefer HCAPTCHA_SECRET env var
# key    = ""   # prefer HCAPTCHA_KEY env var

# ── Security / HTTP hardening ─────────────────────────────────────────────────
[security]
hsts_max_age      = 63072000    # 2 years in seconds
healthcheck_path  = "/health"

# Auth server domain — added to CSP connect-src automatically
auth_domain = "https://auth.jasonpoage.com"

# CSP arrays — extend per environment without touching source code.
# Each array is merged; the base URL is appended automatically.
[security.csp]
default_src = ["'self'"]
script_src  = [
  "'self'",
  "https://hcaptcha.com",
  "https://cdn.jsdelivr.net",
  "https://cdnjs.cloudflare.com",
  "https://jigsaw.w3.org",
]
style_src = [
  "'self'",
  "https:",
  # Update this SHA when your inline style changes:
  "'sha256-IFndQX5fbz502m3YOxm0DNm7rM0AXxtuHDGmEwvNjfk='",
]
img_src = [
  "'self'",
  "data:",
  "https://licensebuttons.net",
  "https://cdn.jsdelivr.net",
  "https://jigsaw.w3.org",
]
frame_src   = ["'self'", "https://newassets.hcaptcha.com"]
connect_src = ["'self'"]

# ── Endpoints (OIDC reveal links, Authelia URLs) ──────────────────────────────
[endpoints]
reveal_base      = "https://access.jasonpoage.com/access/"
auth_endpoint    = "https://auth.jasonpoage.com/api/firstfactor"
login_path       = "/auth/login"
status_endpoint  = "/api/auth/status"
logout_endpoint  = "/api/auth/logout"
default_redirect = "/guest-access"

# ── Log session cleanup thresholds ────────────────────────────────────────────
[cleanup.development]
max_session_count        = 25
session_retention_hours  = 1
max_total_size_mb        = 50
max_disk_usage_percent   = 85
cleanup_interval_minutes = 15
emergency_cleanup_ratio  = 0.7

[cleanup.production]
max_session_count        = 100
session_retention_hours  = 24
max_total_size_mb        = 200
max_disk_usage_percent   = 90
cleanup_interval_minutes = 60
emergency_cleanup_ratio  = 0.5

# ── Testing bypass credentials ────────────────────────────────────────────────
[testing]
username = "test"
group    = "test-users"
