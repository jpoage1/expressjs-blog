# charts/expressjs-blog/values.yaml
# Default values for expressjs-blog.
# This chart deploys a stateless Express.js blog application.

nameOverride: ""

image:
  repository: jpoage1/expressjs-blog
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
  # - name: registry-credentials

replicaCount: 1
command: ["node", "src/app.js"]

legacySecretGeneration:
  enabled: false # set true only when legacy TLS cert/key are injected via Terraform set_sensitive

tls:
  enabled: false
  cert: "" # injected via Terraform set_sensitive when legacySecretGeneration.enabled=true
  key: "" # injected via Terraform set_sensitive when legacySecretGeneration.enabled=true
  bundle: "" # leave empty — unused for this chart
  certIssuer: "" # if set, adds cert-manager.io/cluster-issuer annotation to Ingress

vault:
  enabled: false

env:
  NODE_ENV: development
  PUBLIC_SCHEMA: http
  PUBLIC_PORT: "80"
  PUBLIC_DOMAIN: localhost
  PUBLIC_BASE_PATH: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 3400

ingress:
  enabled: true
  className: nginx
  annotations:
    # Rate-limiting / abuse-blocking handled by ingress controller.
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
  tls:
    enabled: true
    secretName: "" # defaults to "<nameOverride|Chart.Name>-tls" if empty
    certIssuer: "" # optional override for tls.certIssuer
  hosts:
    - host: localhost
      paths:
        - path: /
          pathType: Prefix

probes:
  enabled: true
  liveness:
    httpGet:
      path: /
      port: 3400
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    httpGet:
      path: /
      port: 3400
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

configFile:
  enabled: false
  hostPath: "" # absolute path on the host node
  mountPath: "/app/config.toml" # where it appears inside the container
  filename: "config.toml"

sourceConfig:
  enabled: false
  hostPath: ""
  mountPath: "/app"

contentPath:
  enabled: false
  hostPath: ""
  mountPath: "/app/content"

logs:
  enabled: true
  server: ""
  path: ""
  size: 1Gi
  storageClass: "local-path"
  accessMode: ReadWriteOnce
  existingClaim: ""
  hostPath: ""
  mountPath: "/var/log/expressjs-blog"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
