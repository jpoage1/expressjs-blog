apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.nameOverride | default .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.nameOverride | default .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ .Values.nameOverride | default .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Values.nameOverride | default .Chart.Name }}
    spec:
      imagePullSecrets:
        {{- if .Values.imagePullSecrets }}
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
        {{- else }}
        - name: registry-credentials
        {{- end }}
      containers:
        - name: blog
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          command: {{ .Values.command | toJson }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort | default 3400 }}
              protocol: TCP
          {{- if .Values.probes.enabled }}
          livenessProbe:
            {{- if .Values.probes.liveness }}
            {{- toYaml .Values.probes.liveness | nindent 12 }}
            {{- else }}
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
            {{- end }}
          readinessProbe:
            {{- if .Values.probes.readiness }}
            {{- toYaml .Values.probes.readiness | nindent 12 }}
            {{- else }}
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            {{- end }}
          {{- end }}
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
            {{- if kindIs "string" $val }}
              value: {{ $val | quote }}
            {{- else }}
              value: {{ $val | toString | quote }}
            {{- end }}
            {{- end }}
          volumeMounts:
            {{- if .Values.configFile.enabled }}
            - name: config-file
              mountPath: {{ .Values.configFile.mountPath | default "/app/config.toml" }}
              readOnly: true
            {{- end }}
            {{- if .Values.contentPath.enabled }}
            - name: content
              mountPath: {{ .Values.contentPath.mountPath | default "/app/content" }}
              readOnly: true
            {{- end }}
            {{- if .Values.logs.hostPath }}
            - name: logs
              mountPath: {{ .Values.logs.mountPath | default "/var/log/expressjs-blog" }}
            {{- end }}
            {{- if .Values.sourceConfig.enabled }}
            - name: source
              mountPath: {{ .Values.sourceConfig.mountPath | default "/app" }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- if .Values.configFile.enabled }}
        - name: config-file
          {{- if .Values.configFile.hostPath }}
          hostPath:
            path: {{ .Values.configFile.hostPath }}
            type: File
          {{- end }}
        {{- end }}
        {{- if .Values.contentPath.enabled }}
        - name: content
          {{- if .Values.contentPath.hostPath }}
          hostPath:
            path: {{ .Values.contentPath.hostPath }}
            type: Directory
          {{- end }}
        {{- end }}
        {{- if .Values.logs.hostPath }}
        - name: logs
          hostPath:
            path: {{ .Values.logs.hostPath }}
            type: DirectoryOrCreate
        {{- end }}
        {{- if .Values.sourceConfig.enabled }}
        - name: source
          {{- if .Values.sourceConfig.hostPath }}
          hostPath:
            path: {{ .Values.sourceConfig.hostPath }}
            type: Directory
          {{- end }}
        {{- end }}
