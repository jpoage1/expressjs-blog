apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.nameOverride | default .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.nameOverride | default .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ .Values.nameOverride | default .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Values.nameOverride | default .Chart.Name }}
    spec:
      containers:
        - name: blog
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          command: {{ .Values.command | toJson }}
          ports:
            - containerPort: {{ .Values.service.targetPort | default 3000 }}
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- if .Values.dbSecret | default true }}
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dbSecret }}
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dbSecret }}
                  key: DB_PORT
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dbSecret }}
                  key: DB_DATABASE
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dbSecret }}
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dbSecret }}
                  key: DB_PASSWORD
            {{- end }}
          volumeMounts:
            {{- if .Values.configFile.enabled   }}
            - name: config-file
              mountPath: /app/config.toml
              readOnly: true
            {{- end }}
            {{- if .Values.contentPath.enabled  }}
            - name: content
              mountPath: /app/content
              readOnly: true
            {{- end }}
            {{- if .Values.logs.hostPath  }}
            - name: logs
              mountPath: /var/log/expressjs-blog
            {{- end }}
            {{- if .Values.sourceConfig.enabled }}
            - name: source
              mountPath:  "/app"
            {{- end }}
            {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- if .Values.configFile.enabled }}
        - name: config-file
          {{- if .Values.configFile.hostPath }}
          hostPath:
            path: {{ .Values.configFile.hostPath }}
            type: File
          {{- end }}
        {{- end }}
        {{- if .Values.contentPath.enabled }}
        - name: content
          {{- if .Values.contentPath.hostPath }}
          hostPath:
            path: {{ .Values.contentPath.hostPath }}
            type: Directory
          {{- end }}
        {{- end }}
        {{- if .Values.logs.hostPath }}
        - name: logs
          hostPath:
            path: {{ .Values.logs.hostPath }}
            type: DirectoryOrCreate
        {{- end }}
        {{- if .Values.sourceConfig.enabled }}
        - name: source
          {{- if .Values.sourceConfig.hostPath }}
          hostPath:
            path: {{ .Values.sourceConfig.hostPath }}
            type: Directory
          {{- end }}
        {{- end }}
