  - number: 1
    heading: "Project Variances: Autonomous Agents & Data Miners"
    listItems:
      - text: "<strong>Original Scope:</strong> Autonomous multi-threaded dataset miners and the HexaAgent self-correcting feedback loop."
      - text: "<strong>Variance Justification:</strong> Initial prototypes were developed, but research objectives shifted toward generating complex 'chaos' datasets (invalid opcodes, structural noise) to rigorously test AI reasoning."
      - text: "<strong>Current Status:</strong> Generating this level of structured garbage data required high sophistication. The fully autonomous feedback loop was strategically transitioned to a post-capstone development phase."

  - number: 2
    heading: "Project Variances: Hardware Telemetry Integration"
    listItems:
      - text: "<strong>Original Scope:</strong> A custom Lua-based C++ metrics poller for tracking host system health."
      - text: "<strong>Variance Justification:</strong> This poller is a fully developed standalone application from a prior project, and its integration was designated as a stretch goal."
      - text: "<strong>Current Status:</strong> Development hours were reallocated to secure and harden the MVP requirements of the core Hexascript transpiler pipeline."

  - number: 3
    heading: "Project Variances: Visual Error Notifications"
    listItems:
      - text: "<strong>Original Scope:</strong> A real-time visual error notification system within the frontend user interface."
      - text: "<strong>Variance Justification:</strong> The system was successfully prototyped but experienced state-management regressions as the backend architecture evolved."
      - text: "<strong>Current Status:</strong> UI rendering fixes were deprioritized in favor of hardening the core compiler execution pipeline, ensuring critical errors are reliably logged to the backend console."

  - number: 4
    heading: "Project Variances: Golang Orchestration"
    listItems:
      - text: "<strong>Original Scope:</strong> Executing the backend API and C++ core via a Golang orchestration entry point."
      - text: "<strong>Variance Justification:</strong> Initial experiments utilizing a Go-based orchestration layer introduced unnecessary friction and brittleness to the build process."
      - text: "<strong>Current Status:</strong> To maintain high development velocity and system reliability, standard Bash scripting was utilized to orchestrate the FastAPI server and Docker deployment."

  - number: 5
    heading: "Project Variances: Decompilation Visualization"
    listItems:
      - text: "<strong>Original Scope:</strong> Frontend UI components for visualizing reversible decompilation and reverse-mapped logic."
      - text: "<strong>Variance Justification:</strong> Early drafts successfully visualized this logic. However, implementing strict cross-boundary data normalization (OpenAPI, Pydantic, Zod, Pybind11) rendered the original UI plumbing obsolete."
      - text: "<strong>Current Status:</strong> Rebuilding these specific Svelte panes was deferred to prioritize critical system deployment and reproducibility standards, such as .deb packages and Docker images."

  - number: 6
    heading: "Project Variances: Dual-Pane Inference UI"
    listItems:
      - text: "<strong>Original Scope:</strong> Dual-pane simultaneous comparative rendering for A/B testing of prompt configurations."
      - text: "<strong>Variance Justification:</strong> This feature was nearly functional prior to the data-typing refactor. Development was postponed based on strict architectural priority."
      - text: "<strong>Current Status:</strong> It was strategically necessary to stabilize the upstream data generation and C++ compilation phases before finalizing downstream LLM inference comparisons."

  - number: 7
    heading: "Project Variances: LLM Server List UI"
    listItems:
      - text: "<strong>Original Scope:</strong> A dedicated Server List View UI implementation for managing LLM servers."
      - text: "<strong>Variance Justification:</strong> While basic server configurations exist in the backend, the dedicated frontend UI was deferred due to strict time constraints."
      - text: "<strong>Current Status:</strong> Development bandwidth was allocated exclusively to stabilizing the foundational CRUD operations that form the core requirements of the Frontend-Backend-Database architecture."

  - number: 8
    heading: "Project Variances: Dynamic Manifest Sync"
    listItems:
      - text: "<strong>Original Scope:</strong> Dynamic manifest synchronization fetching C++ binary capabilities via the /api/capabilities endpoint."
      - text: "<strong>Variance Justification:</strong> The endpoint and dynamic capability broadcasting are fully operational within the C++ core and FastAPI backend."
      - text: "<strong>Current Status:</strong> The variance is strictly limited to the Svelte frontend, which does not yet parse this endpoint to dynamically render its component layout."

  - number: 9
    heading: "Architectural Scalability: Control & Data Plane Split"
    listItems:
      - text: "The system implements a Controller/Worker architecture, separating the research sandbox from the main API server to establish a strict Control Plane / Data Plane split."
      - text: "<strong>API Server (Control Plane):</strong> Acts as a stable, thin coordinator managing database persistence, state, and orchestration."
      - text: "<strong>Sandbox (Data Plane):</strong> An ephemeral, high-performance execution environment dedicated to heavy, unpredictable logic processing."

  - number: 10
    heading: "System Isolation & Fault Tolerance"
    listItems:
      - text: "Decoupling the sandbox into a separate container or remote node (e.g., a Raspberry Pi or VPS) prevents research-intensive tasks from starving the API of resources."
      - text: "<strong>Failure Isolation:</strong> If an experimental research script causes a memory overflow or kernel panic, the API server remains online and stable to report the failure."
      - text: "<strong>Synchronization:</strong> The remote sandbox autonomously reports execution results and telemetry back to the API via webhooks or shared volumes."

  - number: 11
    heading: "Solving the 'No Package Manager' Problem"
    listItems:
      - text: "While a distroless Docker image minimizes the API's attack surface, the research sandbox requires a full Filesystem Hierarchy Standard (FHS) environment for debugging."
      - text: "<strong>Nix-Built FHS Image:</strong> Generates a specialized 'Research Image' equipped with a full shell and debugging suite (gdb, strace, ltrace)."
      - text: "<strong>Debian Overlay:</strong> Layering Nix-built Hexascript binaries onto a debian-slim base provides package management (`apt`) for on-the-fly tool installation while keeping core logic reproducible."

  - number: 12
    heading: "SSH as the Administrative Research Interface"
    listItems:
      - text: "SSH serves as an efficient 'raw access' backdoor, bypassing the need for a GUI during the rapid prototyping phase."
      - text: "Researchers can directly manipulate the environment, test new compiler flags, and manually inspect Intermediate Representation (IR) artifacts."
      - text: "This distributed architecture demonstrates a professional understanding of system isolation, scaling beyond a monolithic application into a distributed logic research system."
  - number: 13
    heading: "Security Segmentation: Distroless vs. Hybrid"
    listItems:
      - text: "Apply image strategies based on architectural roles: utilize the distroless Nix-native approach for the public-facing API server to strictly minimize the attack surface."
      - text: "Reserve the Debian-based hybrid image exclusively for the isolated research sandbox where raw access and FHS assumptions are required."

  - number: 14
    heading: "Diagnostic Tooling & Memory Profiling"
    listItems:
      - text: "The Debian overlay provides immediate `apt` access to standard memory profiling and debugging utilities like Valgrind or GDB."
      - text: "This environment enables rigorous validation of C++ boundary conditions, explicitly testing for memory overflows and unhandled exceptions directly within the deployed container state."

  - number: 15
    heading: "Performance Trade-offs: Bloat vs. Utility"
    listItems:
      - text: "Layering a Debian base introduces non-deterministic image bloat, significantly increasing the storage footprint and potential cold-start latency compared to pure Nix closures."
      - text: "The utility of live inspectability during the presentation and active research phases explicitly outweighs the performance degradation of the larger container footprint."

  - number: 16
    heading: "Local FHS Alternatives (buildFHSUserEnv)"
    listItems:
      - text: "While the hybrid Docker image solves deployment inspectability, local development can achieve the same FHS compliance without container overhead."
      - text: "Utilizing Nix's `buildFHSUserEnv` creates a virtualized FHS namespace locally, maintaining a tight compile-and-test loop before packaging the final Docker artifacts."
