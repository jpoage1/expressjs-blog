services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        NODE_ENV: development
    environment:
      NODE_ENV: development
    volumes:
      - .:/app
      # Anonymous volume prevents host node_modules from overwriting container node_modules
      - /app/node_modules
    ports:
      - "3000:3000"
    command: ["yarn", "start"]
